# clan-officers-panel — Fly.io app config.
# Frontend живёт на GitHub Pages, backend здесь.
# Volume officers_data замаунтен в /data — SQLite, lock, snapshots.

app = "clan-officers-panel"
primary_region = "ams"   # Amsterdam — ближе всего к РФ из free regions

[build]
  dockerfile = "Dockerfile"

[env]
  # Origin GitHub Pages — для CORS.
  FRONTEND_URL = "https://santdevil.com"
  EXTRA_ORIGINS = ""
  HOST = "0.0.0.0"
  PORT = "8765"

[http_service]
  internal_port = 8765
  force_https = true
  # always-on: машина не засыпает, бэкенд всегда доступен.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[mounts]]
  source = "officers_data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  # 1024MB — на 512MB Chromium tab crash на тяжёлом template.html.
  # Стоимость растёт: ~$3.9/мес вместо $1.9 за VM. На free $5 credit
  # хватает ~1.3 мес — всё ещё достаточно для тестирования.
  memory_mb = 1024
