<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>SanTDeviL // VK auth</title>
  <style>
    html, body { background:#000; color:#00ff41; height:100%; margin:0; display:flex;
                 align-items:center; justify-content:center;
                 font-family:'Cascadia Code','Consolas',monospace; letter-spacing:3px; }
  </style>
</head>
<body>
  AUTHENTICATING...
  <script>
    // Эта страница открывается VK в popup после авторизации.
    // Парсим hash (#access_token=...&user_id=...) — родительское окно подберёт.
    // На случай popup-блокировщиков postMessage'ом тоже передаём.
    (function () {
      try {
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage(
            { type: "vk_auth", hash: window.location.hash, search: window.location.search },
            window.location.origin
          );
        }
      } catch (_) {}
    })();
  </script>
</body>
</html>
