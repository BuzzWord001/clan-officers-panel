<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SanTDeviL — Реестр приёма в клан</title>
  <link rel="stylesheet" href="styles.css?v=11">
  <link rel="icon" type="image/png" href="assets/logo.png">
</head>
<body>

  <canvas id="matrix-canvas"></canvas>
  <img class="bg-girl" src="assets/bg.png?v=11" alt="" aria-hidden="true">
  <div class="scanlines"></div>

  <div class="shell">

    <header class="topbar">
      <div class="brand">
        <img class="brand-logo" src="assets/logo.png" alt="SanTDeviL">
        <div class="brand-name">SanTDeviL</div>
        <span class="classified-badge">Только для офицеров</span>
      </div>
      <div class="user-bar" id="user-bar">
        <span class="who" id="who"></span>
        <button id="logout-btn">Выйти</button>
      </div>
    </header>

    <section class="title-block">
      <div class="glitch">S a n T D e v i L</div>
      <div class="subtitle">Реестр приёма в клан</div>
    </section>

    <main>
      <div class="tabs" id="tabs">
        <a href="index.html" class="active">Реестр</a>
        <a href="audit.html">История</a>
        <a href="settings.html" id="settings-tab" hidden>Настройки</a>
      </div>

      <div class="panel" id="form-panel">
        <h2>Новая запись</h2>
        <form class="form-row" id="add-form" autocomplete="off">
          <div>
            <label for="f-nick">Ник в игре</label>
            <input type="text" id="f-nick" name="nick" placeholder="например, PANDORA" required maxlength="64">
          </div>
          <div>
            <label for="f-title">Титул</label>
            <input type="text" id="f-title" name="title" placeholder="имя или мэйн-ник" maxlength="100">
          </div>
          <div>
            <label for="f-date">Дата приёма</label>
            <input type="date" id="f-date" name="date" required>
          </div>
          <div>
            <label for="f-note">Примечание</label>
            <input type="text" id="f-note" name="note" placeholder="необязательно" maxlength="200">
          </div>
          <div>
            <button type="submit">Добавить</button>
          </div>
        </form>
        <div class="status-line" id="form-status"></div>
      </div>

      <div class="panel">
        <h2>Принятые в клан</h2>
        <table id="acceptances-table">
          <thead>
            <tr>
              <th style="width:42px;">№</th>
              <th>Ник</th>
              <th>Титул</th>
              <th style="width:130px;">Принят</th>
              <th style="width:200px;">Иммунитет</th>
              <th>Примечание</th>
              <th style="width:160px;">Добавил</th>
              <th style="width:120px;"></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
        <div class="empty" id="empty-state" hidden>Список пуст — добавьте первого офицера</div>
      </div>
    </main>

    <footer class="bottom">SanTDeviL — Офицерская панель</footer>
  </div>

  <script src="config.js?v=11"></script>
  <script src="js/matrix.js?v=11"></script>
  <script src="js/api.js?v=11"></script>
  <script src="js/app.js?v=11"></script>
</body>
</html>
