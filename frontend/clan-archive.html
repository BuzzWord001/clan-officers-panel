<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="color-scheme" content="dark">
  <title>SanTDeviL — Архив доблести</title>
  <link rel="stylesheet" href="styles.css?v=1780500000">
  <link rel="icon" type="image/png" href="assets/logo.png">
</head>
<body>

  <canvas id="matrix-canvas"></canvas>
  <img class="bg-girl" src="assets/bg.png?v=1779743290" alt="" aria-hidden="true">
  <div class="scanlines"></div>

  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <img class="brand-logo" src="assets/logo.png" alt="SanTDeviL">
        <div class="brand-name">SanTDeviL</div>
        <span class="classified-badge">Только для офицеров</span>
      </div>
      <div class="user-bar" id="user-bar">
        <span class="who" id="who"></span>
        <button id="logout-btn">Выйти</button>
      </div>
    </header>

    <section class="title-block">
      <div class="glitch">S a n T D e v i L</div>
      <div class="subtitle">Архив снимков доблести</div>
    </section>

    <main>
      <div class="tabs">
        <div class="tabs-group">
          <span class="tabs-group-label">сайт</span>
          <div class="tabs-group-links">
            <a href="index.html">Реестр</a>
            <a href="audit.html">История сайта</a>
          </div>
        </div>
        <div class="tabs-sep" aria-hidden="true"></div>
        <div class="tabs-group">
          <span class="tabs-group-label">чаты</span>
          <div class="tabs-group-links">
            <a href="chat-archive.html">Архив чатов</a>
            <a href="chat-members.html">Участники</a>
          </div>
        </div>
        <div class="tabs-sep" aria-hidden="true"></div>
        <div class="tabs-group">
          <span class="tabs-group-label">клан</span>
          <div class="tabs-group-links">
            <a href="clan-valor.html">Доблесть</a>
            <a href="clan-archive.html" class="active">Архив доблести</a>
          </div>
        </div>
        <div class="tabs-sep admin-only" aria-hidden="true"></div>
        <div class="tabs-group admin-only">
          <span class="tabs-group-label">админ</span>
          <div class="tabs-group-links">
            <a href="settings.html" id="settings-tab">Настройки</a>
          </div>
        </div>
      </div>

      <div class="panel members-panel">
        <div id="archive-summary" class="members-stats"></div>
        <div id="archive-loading" class="chat-loading" hidden>Загрузка…</div>
        <div class="members-table-wrap">
          <table class="members-table" id="archive-table" data-help="clan-archive">
            <thead>
              <tr>
                <th>Неделя</th>
                <th>Дата снимка (UTC)</th>
                <th class="m-col-num">Норматив</th>
                <th class="m-col-num">Кадров</th>
                <th class="m-col-num">Участников</th>
                <th>Заметки</th>
              </tr>
            </thead>
            <tbody id="archive-tbody"></tbody>
          </table>
        </div>
        <div id="archive-empty" class="empty" hidden>Снимков нет</div>
      </div>
    </main>

    <footer class="bottom">SanTDeviL — Офицерская панель</footer>
  </div>

  <script src="config.js?v=1779800000"></script>
  <script src="js/matrix.js?v=1779800000"></script>
  <script src="js/api.js?v=1779800000"></script>
  <script src="js/help-tips.js?v=1780500000"></script>
  <script src="js/clan-archive.js?v=1779800000"></script>
</body>
</html>
