  <style>html,body{background:#140d07;color:#f3e8d2}#matrix-canvas,.bg-girl,.scanlines{display:none!important}html.booting .shell{visibility:hidden}</style>
  <script>setTimeout(function(){document.documentElement.classList.remove("booting");},3500);</script>

  <style>
    /* ── Тайная комната: мистическая изумрудно-каменная тема ── */
    .mc-wrap{--em:#3df5b0;--em-d:#23b487;--stone:#16241d;--stone-d:#0b1611;
      color:#dff3ea;max-width:1080px;margin:0 auto}
    .mc-hero{position:relative;padding:20px 22px;margin:0 0 18px;border-radius:14px;
      background:linear-gradient(180deg,#16241d,#0b1611);
      border:1px solid rgba(61,245,176,.35);
      box-shadow:0 0 34px rgba(61,245,176,.12),inset 0 0 30px rgba(0,0,0,.45)}
    .mc-hero h2{margin:0 0 4px;font:700 20px/1.2 Georgia,serif;color:#9ff0cf;
      letter-spacing:.02em;text-shadow:0 0 12px rgba(61,245,176,.45)}
    .mc-hero .mc-sub{font-size:13px;color:#aecbbf;opacity:.9;margin-bottom:16px}
    /* большая шкала прогресса */
    .mc-bar{position:relative;height:26px;border-radius:13px;overflow:hidden;
      background:#0a1813;border:1px solid rgba(61,245,176,.3)}
    .mc-bar-fill{position:absolute;inset:0;width:0;border-radius:13px;
      background:linear-gradient(90deg,#23b487,#3df5b0 70%,#bff7e0);
      box-shadow:0 0 18px rgba(61,245,176,.6);transition:width .6s cubic-bezier(.2,.9,.3,1)}
    .mc-bar-txt{position:absolute;inset:0;display:flex;align-items:center;
      justify-content:center;font:700 13px system-ui;color:#06150f;
      text-shadow:0 1px 1px rgba(255,255,255,.3)}
    /* карточки статистики */
    .mc-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:10px;margin-top:16px}
    .mc-card{background:rgba(8,20,15,.7);border:1px solid rgba(61,245,176,.22);
      border-radius:10px;padding:11px 13px}
    .mc-card .mc-k{font:600 11px system-ui;color:#8fc7b2;letter-spacing:.04em;
      text-transform:uppercase;opacity:.85}
    .mc-card .mc-v{font:700 19px Georgia,serif;color:#dff3ea;margin-top:3px}
    .mc-card .mc-v small{font:400 12px system-ui;color:#9fc0b3}
    .mc-card.good .mc-v{color:#7ff0c5;text-shadow:0 0 10px rgba(61,245,176,.5)}
    .mc-card.warn .mc-v{color:#f2c97d}
    .mc-pace{margin-top:14px;padding:11px 14px;border-radius:10px;font-size:13.5px;
      background:rgba(61,245,176,.08);border:1px solid rgba(61,245,176,.25);color:#cfeede}
    .mc-pace b{color:#7ff0c5}
    /* настройки */
    .mc-settings{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;
      margin-top:14px;padding-top:14px;border-top:1px dashed rgba(61,245,176,.2)}
    .mc-settings label{font:600 11px system-ui;color:#9fc0b3;display:block;margin-bottom:4px}
    .mc-settings input{width:120px;padding:7px 9px;border-radius:8px;
      background:#0a1813;border:1px solid rgba(61,245,176,.3);color:#dff3ea;font-size:13px}
    .mc-btn{font:600 12.5px system-ui;color:#06150f;cursor:pointer;
      background:linear-gradient(180deg,#5ff0c0,#23b487);border:0;border-radius:8px;
      padding:8px 16px;box-shadow:0 3px 10px rgba(61,245,176,.3)}
    .mc-btn:hover{filter:brightness(1.08)}
    .mc-btn.ghost{background:transparent;color:#9fc0b3;border:1px solid rgba(61,245,176,.3);
      box-shadow:none}
    /* фазы и курсы */
    .mc-phase{margin:16px 0 0;border:1px solid rgba(61,245,176,.18);border-radius:12px;
      overflow:hidden;background:rgba(8,20,15,.55)}
    .mc-phase-h{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;
      background:linear-gradient(180deg,#16241d,#0e1c16);border-bottom:1px solid rgba(61,245,176,.15)}
    .mc-phase-h .mc-ph-name{font:700 14px Georgia,serif;color:#bfeede;flex:1}
    .mc-phase-h .mc-ph-stat{font:600 12px system-ui;color:#8fc7b2}
    .mc-phase-mini{width:90px;height:7px;border-radius:4px;background:#0a1813;
      overflow:hidden;border:1px solid rgba(61,245,176,.2)}
    .mc-phase-mini i{display:block;height:100%;background:linear-gradient(90deg,#23b487,#3df5b0);
      box-shadow:0 0 8px rgba(61,245,176,.5)}
    .mc-course{display:flex;align-items:center;gap:12px;padding:10px 14px;
      border-top:1px solid rgba(61,245,176,.08)}
    .mc-course:hover{background:rgba(61,245,176,.05)}
    .mc-chk{flex-shrink:0;width:22px;height:22px;border-radius:6px;cursor:pointer;
      border:1.5px solid rgba(61,245,176,.5);background:#0a1813;display:flex;
      align-items:center;justify-content:center;font-size:14px;color:#06150f}
    .mc-chk.on{background:linear-gradient(180deg,#5ff0c0,#23b487);border-color:#3df5b0}
    .mc-course-main{flex:1;min-width:0}
    .mc-course-name{font:600 13.5px system-ui;color:#e3f4ec;line-height:1.3}
    .mc-course-meta{font:400 11.5px system-ui;color:#8fb3a4;margin-top:2px}
    .mc-tag{display:inline-block;font:600 10px system-ui;padding:1px 6px;border-radius:5px;
      margin-left:6px;vertical-align:middle}
    .mc-tag.must{background:rgba(61,245,176,.18);color:#9ff0cf}
    .mc-tag.alternative{background:rgba(123,170,255,.18);color:#a9c6ff}
    .mc-tag.optional{background:rgba(242,201,125,.16);color:#f2c97d}
    .mc-tag.reference{background:rgba(160,160,160,.16);color:#c8c8c8}
    .mc-cprog{flex-shrink:0;width:140px}
    .mc-cprog-bar{height:8px;border-radius:4px;background:#0a1813;overflow:hidden;
      border:1px solid rgba(61,245,176,.2)}
    .mc-cprog-bar i{display:block;height:100%;background:linear-gradient(90deg,#23b487,#3df5b0);
      transition:width .4s}
    .mc-cprog-txt{font:600 11px system-ui;color:#9fc0b3;text-align:right;margin-top:3px}
    .mc-cprog input{width:54px;padding:3px 5px;font-size:11px;border-radius:5px;
      background:#0a1813;border:1px solid rgba(61,245,176,.25);color:#dff3ea}
    .mc-hint{font-size:12px;color:#8fb3a4;margin:18px 0 6px;padding:10px 14px;
      border-radius:10px;background:rgba(8,20,15,.5);border:1px dashed rgba(61,245,176,.2)}
    .mc-loading{text-align:center;padding:50px;color:#8fc7b2;font:600 15px Georgia,serif}
    @media(max-width:560px){.mc-cprog{width:96px}.mc-course-meta{display:none}}
  </style>
