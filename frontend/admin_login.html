<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SanTDeviL // Admin Console</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="assets/logo.png">
</head>
<body>

  <canvas id="matrix-canvas"></canvas>
  <div class="scanlines"></div>

  <div class="login-shell">
    <div class="login-card">
      <div class="lock" style="color: var(--danger); border-color: var(--danger);">▓ ADMIN CONSOLE ▓</div>
      <img class="brand-logo" src="assets/logo.png" alt="SanTDeviL"
           style="width: 90px; height: 90px; margin: 0 auto 12px; display: block;">
      <h1>SanTDeviL</h1>
      <div class="login-sub">// ROOT ACCESS</div>

      <form id="admin-form" autocomplete="off" novalidate style="margin-top: 24px;">
        <div class="form-group">
          <label for="a-user">Логин администратора</label>
          <input type="text" id="a-user" name="username"
                 autocomplete="off"
                 required minlength="2" maxlength="32">
        </div>

        <div class="form-group">
          <label for="a-password">Пароль администратора</label>
          <input type="password" id="a-password" name="password"
                 autocomplete="off"
                 required minlength="1" maxlength="200">
        </div>

        <div class="form-actions">
          <button type="submit" id="admin-btn">Войти как admin</button>
        </div>
      </form>

      <div class="login-divider" style="margin: 22px 0 12px;">// или //</div>
      <a href="login.html" class="admin-link">Вход офицера</a>

      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="js/matrix.js"></script>
  <script src="js/api.js"></script>
  <script src="js/admin_login.js"></script>
</body>
</html>
