<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#140d07">
  <meta name="color-scheme" content="dark">
  <title>SanTDeviL — вход администратора</title>
  <link rel="stylesheet" href="styles.css?v=1802100000">
  <style>html,body{background:#140d07;color:#f3e8d2}#matrix-canvas,.bg-girl,.scanlines{display:none!important}</style>
  <!-- Восстановление из bfcache → перезагрузка (не показываем старую версию). -->
  <script>window.addEventListener("pageshow",function(e){if(e.persisted)location.reload();});</script>
  <link rel="icon" type="image/png" href="assets/logo.png?v=1798200000">
</head>
<body>


  <main class="auth-shell">
    <form class="auth-card auth-card--admin" id="admin-form" autocomplete="off" novalidate>

      <header class="auth-head">
        <img class="auth-logo" src="assets/logo.png?v=1798200000" alt="">
        <h1 class="auth-title">SanTDeviL</h1>
        <p class="auth-sub auth-sub--admin">Вход администратора</p>
      </header>

      <div class="auth-field">
        <label for="a-user">Логин</label>
        <input type="text" id="a-user" name="username"
               autocomplete="off"
               required minlength="2" maxlength="32" autofocus>
      </div>

      <div class="auth-field auth-field--pwd">
        <label for="a-password">Пароль администратора</label>
        <input type="password" id="a-password" name="password"
               autocomplete="off"
               required maxlength="200">
        <button type="button" class="pwd-toggle" data-pwd-for="a-password"
                aria-label="Показать пароль" title="Показать пароль">
          <svg class="i-eye" viewBox="0 0 24 24" width="20" height="20" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg class="i-eye-off" viewBox="0 0 24 24" width="20" height="20" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-10-7-10-7a18.5 18.5 0 0 1 5.06-5.94"/>
            <path d="M9.9 5.08A10.94 10.94 0 0 1 12 5c7 0 10 7 10 7a18.5 18.5 0 0 1-3.18 4.18"/>
            <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
            <line x1="2" y1="2" x2="22" y2="22"/>
          </svg>
        </button>
      </div>

      <button type="submit" class="auth-submit" id="admin-btn">Войти</button>

      <p class="auth-error" id="login-error" role="alert" aria-live="polite"></p>

      <a class="auth-secondary" href="login.html">← Вход офицера</a>
    </form>
  </main>

  <script src="config.js?v=1791600000"></script>
  <script src="js/api.js?v=1795930000"></script>
  <script src="js/password_toggle.js?v=1795930000"></script>
  <script src="js/admin_login.js?v=1779743290"></script>
  <script src="js/tooltips.js?v=1802000000"></script>
</body>
</html>
