<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="color-scheme" content="dark">
  <title>SanTDeviL — Доблесть</title>
  <link rel="stylesheet" href="styles.css?v=1779800000">
  <link rel="icon" type="image/png" href="assets/logo.png">
</head>
<body>

  <canvas id="matrix-canvas"></canvas>
  <img class="bg-girl" src="assets/bg.png?v=1779743290" alt="" aria-hidden="true">
  <div class="scanlines"></div>

  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <img class="brand-logo" src="assets/logo.png" alt="SanTDeviL">
        <div class="brand-name">SanTDeviL</div>
        <span class="classified-badge">Только для офицеров</span>
      </div>
      <div class="user-bar" id="user-bar">
        <span class="who" id="who"></span>
        <button id="logout-btn">Выйти</button>
      </div>
    </header>

    <section class="title-block">
      <div class="glitch">S a n T D e v i L</div>
      <div class="subtitle">Доблесть участников клана</div>
    </section>

    <main>
      <div class="tabs">
        <div class="tabs-group">
          <span class="tabs-group-label">сайт</span>
          <div class="tabs-group-links">
            <a href="index.html">Реестр</a>
            <a href="audit.html">История сайта</a>
          </div>
        </div>
        <div class="tabs-sep" aria-hidden="true"></div>
        <div class="tabs-group">
          <span class="tabs-group-label">чаты</span>
          <div class="tabs-group-links">
            <a href="chat-archive.html">Архив чатов</a>
            <a href="chat-members.html">Участники</a>
          </div>
        </div>
        <div class="tabs-sep" aria-hidden="true"></div>
        <div class="tabs-group">
          <span class="tabs-group-label">клан</span>
          <div class="tabs-group-links">
            <a href="clan-valor.html" class="active">Доблесть</a>
            <a href="clan-archive.html">Архив доблести</a>
          </div>
        </div>
        <div class="tabs-sep admin-only" aria-hidden="true"></div>
        <div class="tabs-group admin-only">
          <span class="tabs-group-label">админ</span>
          <div class="tabs-group-links">
            <a href="settings.html" id="settings-tab">Настройки</a>
          </div>
        </div>
      </div>

      <div class="panel members-panel">
        <div class="members-header">
          <div class="members-stats" id="valor-summary"></div>
          <div class="members-search">
            <input type="text" id="valor-filter"
                   placeholder="Фильтр: ник / истинное имя / класс / должность">
          </div>
        </div>

        <div id="valor-loading" class="chat-loading" hidden>Загрузка…</div>

        <div class="members-table-wrap">
          <table class="members-table" id="valor-table">
            <thead>
              <tr>
                <th class="m-col-idx">#</th>
                <th class="m-col-name"      data-sort="nick">Ник</th>
                <th data-sort="true_name">Истинное имя</th>
                <th data-sort="rank">Должность</th>
                <th data-sort="title">Титул</th>
                <th class="m-col-num"  data-sort="level">Ур.</th>
                <th data-sort="class">Класс</th>
                <th class="m-col-num"  data-sort="valor" data-dir="desc">Доблесть</th>
                <th class="m-col-num"  data-sort="norm">Норматив</th>
              </tr>
            </thead>
            <tbody id="valor-tbody"></tbody>
          </table>
        </div>
        <div id="valor-empty" class="empty" hidden>Снимков нет ещё</div>
      </div>
    </main>

    <footer class="bottom">SanTDeviL — Офицерская панель</footer>
  </div>

  <script src="config.js?v=1779800000"></script>
  <script src="js/matrix.js?v=1779800000"></script>
  <script src="js/api.js?v=1779800000"></script>
  <script src="js/clan-valor.js?v=1779800000"></script>
</body>
</html>
