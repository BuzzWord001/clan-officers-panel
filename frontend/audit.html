<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="color-scheme" content="dark">
  <title>SanTDeviL — История реестра</title>
  <link rel="stylesheet" href="styles.css?v=1795400000">

<body>

  <canvas id="matrix-canvas"></canvas>
  <img class="bg-girl" src="assets/bg.png?v=1779743290" alt="" aria-hidden="true">
  <div class="scanlines"></div>

  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <img class="brand-logo" src="assets/logo.png" alt="SanTDeviL">
        <div class="brand-name">SanTDeviL</div>
        <span class="classified-badge">Только для офицеров</span>
      </div>
      <div class="user-bar" id="user-bar">
        <span class="who" id="who"></span>
        <button id="logout-btn">Выйти</button>
      </div>
    </header>

    <section class="title-block">
      <div class="glitch">S a n T D e v i L</div>
      <div class="subtitle">История изменений реестра</div>
    </section>

    <main>
      <div class="tabs">
        <div class="tabs-group">
          <span class="tabs-group-label">сайт</span>
          <div class="tabs-group-links">
            <a href="index.html">Реестр</a>
            <a href="audit.html" class="active">История реестра</a>
          </div>
        </div>
        <div class="tabs-sep" aria-hidden="true"></div>
        <div class="tabs-group">
          <span class="tabs-group-label">чаты</span>
          <div class="tabs-group-links">
            <a href="chat-archive.html">Архив чатов</a>
            <a href="chat-members.html">Участники</a>
          </div>
        </div>
        <div class="tabs-sep" aria-hidden="true"></div>
        <div class="tabs-group">
          <span class="tabs-group-label">клан</span>
          <div class="tabs-group-links">
            <a href="clan-valor.html">Доблесть</a>
            <a href="valor-screens.html">Архив скринов доблести</a>
          </div>
        </div>
        <div class="tabs-sep admin-only" aria-hidden="true"></div>
        <div class="tabs-group admin-only">
          <span class="tabs-group-label">админ</span>
          <div class="tabs-group-links">
            <a href="settings.html" id="settings-tab">Настройки</a>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>Последние изменения</h2>
          <button id="clear-all" class="danger" hidden>Очистить всю историю</button>
        </div>
        <div class="audit-scroll">
          <div class="audit-list" id="audit-list"></div>
        </div>
        <div class="empty" id="empty-state" hidden>История пуста</div>
      </div>

    <footer class="bottom">SanTDeviL — Офицерская панель</footer>
  </div>

  <script src="config.js?v=1791600000"></script>
  <script src="js/matrix.js?v=1779743290"></script>
  <script src="js/api.js?v=1788600000"></script>

  <script src="js/tooltips.js?v=1786000400"></script>
  <script src="js/social-bar.js?v=1792200000"></script>
  <script src="js/chamber-door.js?v=1791800000"></script>
  <script src="js/magic-social.js?v=1795880000"></script>
