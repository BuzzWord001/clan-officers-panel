<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="color-scheme" content="dark">
  <title>SanTDeviL — вход</title>
  <link rel="stylesheet" href="styles.css?v=1791400000">
  <link rel="icon" type="image/png" href="assets/logo.png">
</head>
<body>

  <canvas id="matrix-canvas"></canvas>

  <main class="auth-shell">
    <form class="auth-card" id="login-form" autocomplete="on" novalidate>

      <header class="auth-head">
        <img class="auth-logo" src="assets/logo.png" alt="">
        <h1 class="auth-title">SanTDeviL</h1>
        <p class="auth-sub">Добро пожаловать</p>
      </header>

      <div class="auth-field">
        <label for="f-nick">Игровой ник</label>
        <input type="text" id="f-nick" name="username"
               autocomplete="username"
               required maxlength="64"
               autofocus>
      </div>

      <div class="auth-field auth-field--pwd">
        <label for="f-password">Общий пароль офицеров</label>
        <input type="password" id="f-password" name="password"
               autocomplete="current-password"
               required maxlength="200">
        <button type="button" class="pwd-toggle" data-pwd-for="f-password"
                aria-label="Показать пароль" title="Показать пароль">
          <svg class="i-eye" viewBox="0 0 24 24" width="20" height="20" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg class="i-eye-off" viewBox="0 0 24 24" width="20" height="20" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-10-7-10-7a18.5 18.5 0 0 1 5.06-5.94"/>
            <path d="M9.9 5.08A10.94 10.94 0 0 1 12 5c7 0 10 7 10 7a18.5 18.5 0 0 1-3.18 4.18"/>
            <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
            <line x1="2" y1="2" x2="22" y2="22"/>
          </svg>
        </button>
      </div>

      <button type="submit" class="auth-submit" id="login-btn">Войти</button>

      <p class="auth-error" id="login-error" role="alert" aria-live="polite"></p>

      <div class="auth-or"><span>или</span></div>

      <button type="button" class="auth-guest" id="guest-btn">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <span>Войти как гость</span>
        <small>просмотр таблицы Доблести и статистики</small>
      </button>

      <a class="auth-secondary" href="admin_login.html">Я администратор</a>

      <nav class="auth-social" aria-label="Площадки клана">
        <span class="auth-social-title">Наш клан на связи</span>
        <div class="auth-social-grid">
          <a class="soc-btn" style="--brand:#0077ff" data-soc="vk-group"
             href="https://vk.com/club38888207" target="_blank" rel="noopener noreferrer" title="Группа клана ВКонтакте">
            <svg class="soc-ic" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M21.547 7.293c.14-.477 0-.828-.681-.828h-2.252c-.573 0-.836.302-.98.635 0 0-1.145 2.786-2.766 4.594-.524.525-.763.692-1.049.692-.143 0-.35-.167-.35-.643V7.293c0-.572-.166-.828-.643-.828H9.79c-.357 0-.572.266-.572.519 0 .542.81.667.893 2.19v3.309c0 .725-.13.858-.417.858-.763 0-2.618-2.798-3.718-6.001-.215-.622-.43-.873-1.006-.873H2.717c-.643 0-.772.302-.772.635 0 .596.762 3.55 3.551 7.458 1.859 2.67 4.479 4.115 6.863 4.115 1.43 0 1.607-.32 1.607-.874v-2.02c0-.643.136-.772.59-.772.334 0 .906.167 2.24 1.455 1.526 1.525 1.777 2.209 2.634 2.209h2.252c.643 0 .961-.32.777-.95-.202-.629-.93-1.543-1.897-2.626-.525-.62-1.31-1.287-1.55-1.621-.333-.43-.238-.62 0-1.002 0 0 2.745-3.86 3.03-5.169z"/></svg>
            <span class="soc-tx"><b>ВКонтакте</b><small>группа клана</small></span>
          </a>
          <a class="soc-btn" style="--brand:#0077ff" data-soc="vk-chat"
             href="https://vk.me/join/rya0CI_hEnkgsCQdahj2jIb3r0wD6OHIA_E=" target="_blank" rel="noopener noreferrer" title="Беседа клана ВКонтакте">
            <svg class="soc-ic" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2C6.477 2 2 5.94 2 10.8c0 2.49 1.18 4.73 3.07 6.32-.13 1.4-.6 2.92-1.32 4.02-.16.24.04.56.32.5 1.94-.42 3.6-1.18 4.86-2.04.66.13 1.36.2 2.07.2 5.523 0 10-3.94 10-8.8S17.523 2 12 2zm-4 8.05a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5zm4 0a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5zm4 0a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5z"/></svg>
            <span class="soc-tx"><b>VK-чат</b><small>беседа клана</small></span>
          </a>
          <a class="soc-btn" style="--brand:#29a9eb" data-soc="tg"
             href="https://t.me/+6U3XCSrrZgo1YTMy" target="_blank" rel="noopener noreferrer" title="Telegram клана">
            <svg class="soc-ic" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.5 1.201-.82 1.23-.697.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.259-1.91.176-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212-.07-.062-.174-.041-.249-.024-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
            <span class="soc-tx"><b>Telegram</b><small>чат клана</small></span>
          </a>
          <a class="soc-btn" style="--brand:#2580c3" data-soc="ts"
             href="ts3server://melodybum.ts3.se" rel="noopener noreferrer" title="TeamSpeak: melodybum.ts3.se (клик — подключиться, нужен установленный TS3)">
            <svg class="soc-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 14v-3a8 8 0 0 1 16 0v3"/>
              <path d="M5 12H4a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h1a1 1 0 0 0 1-1v-6a1 1 0 0 0-1-1z" fill="currentColor"/>
              <path d="M19 12h1a2 2 0 0 1 2 2v2a2 2 0 0 1-2 2h-1a1 1 0 0 1-1-1v-6a1 1 0 0 1 1-1z" fill="currentColor"/>
              <path d="M18 18a4 4 0 0 1-4 3h-2"/>
            </svg>
            <span class="soc-tx"><b>TeamSpeak</b><small>melodybum.ts3.se</small></span>
          </a>
        </div>
      </nav>
    </form>
  </main>

  <script src="config.js?v=1786000000"></script>
  <script src="js/matrix.js?v=1783100000"></script>
  <script src="js/api.js?v=1788600000"></script>
  <script src="js/password_toggle.js?v=1783100000"></script>
  <script src="js/login.js?v=1786000000"></script>
  <script src="js/tooltips.js?v=1786000400"></script>
</body>
</html>
