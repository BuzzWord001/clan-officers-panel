<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SanTDeviL — вход</title>
  <link rel="stylesheet" href="styles.css?v=4">
  <link rel="icon" type="image/png" href="assets/logo.png">
</head>
<body>

  <canvas id="matrix-canvas"></canvas>

  <main class="auth-shell">
    <form class="auth-card" id="login-form" autocomplete="on" novalidate>

      <header class="auth-head">
        <img class="auth-logo" src="assets/logo.png" alt="">
        <h1 class="auth-title">SanTDeviL</h1>
        <p class="auth-sub">Реестр приёма в клан</p>
      </header>

      <div class="auth-field">
        <label for="f-nick">Игровой ник</label>
        <input type="text" id="f-nick" name="username"
               autocomplete="username"
               required minlength="2" maxlength="32"
               pattern="[A-Za-zА-Яа-яЁё0-9 _\-.]{2,32}"
               autofocus>
      </div>

      <div class="auth-field">
        <label for="f-password">Пароль</label>
        <input type="password" id="f-password" name="password"
               autocomplete="current-password"
               required maxlength="200">
      </div>

      <button type="submit" class="auth-submit" id="login-btn">Войти</button>

      <p class="auth-error" id="login-error" role="alert" aria-live="polite"></p>

      <a class="auth-secondary" href="admin_login.html">Я администратор</a>
    </form>
  </main>

  <script src="config.js?v=4"></script>
  <script src="js/matrix.js?v=4"></script>
  <script src="js/api.js?v=4"></script>
  <script src="js/login.js?v=4"></script>
</body>
</html>
