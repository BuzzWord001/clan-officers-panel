<!doctype html>
<html lang="ru" class="booting">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#140d07">
  <meta name="color-scheme" content="dark">
  <title>SanTDeviL — вход</title>
  <link rel="stylesheet" href="styles.css?v=1806000000">
  <style>html,body{background:#140d07;color:#f3e8d2}#matrix-canvas,.bg-girl,.scanlines{display:none!important}html.booting .auth-shell{visibility:hidden}
  .auth-hint{margin:-4px 0 14px;padding:9px 11px;border-radius:9px;font:400 12px/1.5 system-ui,sans-serif;color:#ecdcbe;background:rgba(224,162,74,.1);border:1px solid rgba(224,162,74,.28)}
  .auth-hint b{color:#f0c878;font-weight:700}</style>
  <script>setTimeout(function(){document.documentElement.classList.remove("booting");},3500);</script>
  <!-- Если страница входа восстановлена из bfcache (Назад/Вперёд или возврат
       после «Выйти») — перезагружаем, чтобы НИКОГДА не показать устаревшую
       версию (старое оформление/«регистрацию» из кэша браузера). -->
  <script>window.addEventListener("pageshow",function(e){if(e.persisted)location.reload();});</script>
  <link rel="icon" type="image/png" href="assets/logo.png?v=1798200000">
</head>
<body>


  <main class="auth-shell">
    <form class="auth-card" id="login-form" autocomplete="on" novalidate>

      <header class="auth-head">
        <img class="auth-logo" src="assets/logo.png?v=1798200000" alt="">
        <h1 class="auth-title">SanTDeviL</h1>
        <p class="auth-sub">Добро пожаловать</p>
      </header>

      <div class="auth-field">
        <label for="f-nick">Введите ваш игровой ник</label>
        <input type="text" id="f-nick" name="username"
               autocomplete="username"
               required maxlength="64"
               autofocus>
      </div>

      <div class="auth-field auth-field--pwd">
        <label for="f-password">Офицерский пароль</label>
        <input type="password" id="f-password" name="password"
               autocomplete="current-password"
               placeholder="Введите офицерский пароль"
               required maxlength="200">
        <button type="button" class="pwd-toggle" data-pwd-for="f-password"
                aria-label="Показать пароль" title="Показать пароль">
          <svg class="i-eye" viewBox="0 0 24 24" width="20" height="20" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg class="i-eye-off" viewBox="0 0 24 24" width="20" height="20" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-10-7-10-7a18.5 18.5 0 0 1 5.06-5.94"/>
            <path d="M9.9 5.08A10.94 10.94 0 0 1 12 5c7 0 10 7 10 7a18.5 18.5 0 0 1-3.18 4.18"/>
            <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
            <line x1="2" y1="2" x2="22" y2="22"/>
          </svg>
        </button>
      </div>

      <p class="auth-hint">🔒 Пароль есть в <b>закреплённом сообщении</b> офицерского чата ВК или Telegram</p>

      <button type="submit" class="auth-submit" id="login-btn">Войти</button>

      <p class="auth-error" id="login-error" role="alert" aria-live="polite"></p>

      <div class="auth-or"><span>или</span></div>

      <button type="button" class="auth-guest" id="guest-btn">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <span>Войти как гость</span>
        <small>просмотр таблицы Доблести и статистики</small>
      </button>

      <a class="auth-secondary" href="admin_login.html">Я администратор</a>
    </form>
  </main>

  <script src="config.js?v=1791600000"></script>
  <script src="js/api.js?v=1816500000"></script>
  <script src="js/password_toggle.js?v=1795930000"></script>
  <script src="js/login.js?v=1795930000"></script>
  <script src="js/tooltips.js?v=1802000000"></script>
  <script src="js/social-bar.js?v=1800100000"></script>
</body>
</html>
